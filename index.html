<!DOCTYPE html>

<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Italiano">
<title>Italiano — тренажёр</title>
<style>
  :root{
    --paper:#f6f1e7; --paper-card:#fffaf0; --ink:#3a352c; --muted:#8a8073;
    --accent:#c46b4e; --accent-soft:#eddbc9; --good:#4f7a5c; --good-bg:#e7f0e8;
    --bad:#b1503f; --bad-bg:#f7e6e2; --line:#e4d9c6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 24px);
  }
  .wrap{width:100%; max-width:460px;}

  header{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  h1{font-size:18px; font-weight:700; margin:0;}
  .stats{
    font-size:12.5px; color:var(--muted); display:flex; gap:10px; align-items:center;
  }
  .stats b.g{color:var(--good);} .stats b.b{color:var(--bad);}

  .tabs{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;}
  .tab{
    font-size:12.5px; font-weight:600; padding:7px 12px; border-radius:20px;
    background:var(--paper-card); border:1px solid var(--line); color:var(--muted);
    cursor:pointer; white-space:nowrap; user-select:none;
  }
  .tab.active{background:var(--accent); color:#fff; border-color:var(--accent);}

  .meta-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:8px; font-size:12px; color:var(--muted);
  }

  .card{
    background:var(--paper-card); border:1px solid var(--line); border-radius:18px;
    padding:24px 20px; box-shadow:0 1px 3px rgba(0,0,0,.05);
  }
  .kind{
    font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em;
    margin-bottom:10px; font-weight:600;
  }
  .prompt{font-size:19px; line-height:1.5; margin-bottom:18px;}
  .prompt b.hl{background:var(--accent-soft); border-radius:5px; padding:0 4px;}

  input[type=text]{
    width:100%; font-size:17px; padding:13px 14px; border-radius:12px;
    border:1.5px solid var(--line); background:#fff; color:var(--ink);
    outline:none; font-family:inherit;
  }
  input[type=text]:focus{border-color:var(--accent);}

  .btnrow{display:flex; gap:10px; margin-top:12px;}
  button{
    flex:1; font-size:15px; font-weight:600; padding:13px; border-radius:12px;
    border:none; cursor:pointer; font-family:inherit;
  }
  .check-btn{background:var(--accent); color:#fff;}
  .next-btn{background:var(--accent-soft); color:var(--ink); display:none;}

  .feedback{
    margin-top:14px; padding:12px 14px; border-radius:12px; font-size:15px;
    display:none; line-height:1.4;
  }
  .feedback.correct{background:var(--good-bg); color:var(--good); display:block;}
  .feedback.incorrect{background:var(--bad-bg); color:var(--bad); display:block;}
  .feedback .correct-answer{font-weight:700; margin-top:2px;}

  .empty{
    text-align:center; padding:50px 20px; color:var(--muted); font-size:15px; line-height:1.6;
  }

  .footer-row{
    display:flex; justify-content:center; margin-top:18px;
  }
  .reset-link{
    font-size:12px; color:var(--muted); text-decoration:underline; cursor:pointer; background:none; border:none; flex:none; padding:6px;
  }
</style>
</head>
<body>

CARD_DATA.forEach((c,i)=>{ c.id = "c"+i; });

/* ======================= SRS SETTINGS ======================= */
const INTERVALS = [0, 1, 3, 7, 14, 30, 60, 120]; // days
const NEW_PER_DAY = 15;
const STORAGE_SRS = "italiano_v3_srs";
const STORAGE_STATS = "italiano_v3_stats";
const STORAGE_LASTOPEN = "italiano_v3_lastday";

/* day rollover at 4am */
function todayKey(){
  const d = new Date();
  const adj = new Date(d.getTime() - 4*60*60*1000);
  return adj.toISOString().slice(0,10);
}

function loadSRS(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_SRS)) || {}; }catch(e){ return {}; }
}
function saveSRS(state){ localStorage.setItem(STORAGE_SRS, JSON.stringify(state)); }

function loadStats(){
  try{
    const s = JSON.parse(localStorage.getItem(STORAGE_STATS));
    if(s && s.day === todayKey()) return s;
  }catch(e){}
  return {day: todayKey(), correct:0, wrong:0};
}
function saveStats(s){ localStorage.setItem(STORAGE_STATS, JSON.stringify(s)); }

let srsState = loadSRS();
let stats = loadStats();

function ensureCardState(id){
  if(!srsState[id]){
    srsState[id] = {box:0, due: todayKey(), seen:false};
  }
  return srsState[id];
}
CARD_DATA.forEach(c=>ensureCardState(c.id));
saveSRS(srsState);

/* ======================= QUEUE BUILDING ======================= */
let activeTopic = "Смешанное";
let deck = [];
let idx = 0;

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildDeck(){
  const today = todayKey();
  if(activeTopic === "Смешанное"){
    const due = CARD_DATA.filter(c => srsState[c.id].seen && srsState[c.id].due <= today);
    const fresh = CARD_DATA.filter(c => !srsState[c.id].seen).slice(0, NEW_PER_DAY);
    deck = shuffle(due.concat(fresh));
    if(deck.length === 0){
      // nothing due, nothing new left today: allow reviewing ahead a little so it's never empty
      deck = shuffle(CARD_DATA.filter(c => srsState[c.id].seen));
    }
  } else {
    deck = shuffle(CARD_DATA.filter(c => c.topic === activeTopic));
  }
  idx = 0;
}

/* ======================= MATCHING ======================= */
function normalize(s){
  return s.trim().toLowerCase()
    .replace(/[.,!?]/g,'')
    .replace(/à/g,'a').replace(/è|é/g,'e').replace(/ì/g,'i').replace(/ò/g,'o').replace(/ù/g,'u');
}
function isCorrect(userAns, answers){
  const u = normalize(userAns);
  if(!u) return false;
  return answers.some(ans => normalize(ans) === u);
}

/* ======================= UI ======================= */
const topics = ["Смешанное", ...Array.from(new Set(CARD_DATA.map(c=>c.topic)))];

function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  topics.forEach(t=>{
    const el = document.createElement('div');
    el.className = 'tab' + (t===activeTopic ? ' active' : '');
    el.textContent = t;
    el.addEventListener('click', ()=>{
      activeTopic = t;
      buildDeck();
      renderTabs();
      renderCard();
    });
    tabsEl.appendChild(el);
  });
}

function renderStats(){
  document.getElementById('statCorrect').textContent = stats.correct;
  document.getElementById('statWrong').textContent = stats.wrong;
}

function renderMeta(){
  const meta = document.getElementById('metaRow');
  if(deck.length === 0){ meta.textContent = ''; return; }
  meta.textContent = `Carta ${Math.min(idx+1, deck.length)} di ${deck.length}`;
}

function renderCard(){
  renderMeta();
  const area = document.getElementById('cardArea');
  if(deck.length === 0){
    area.innerHTML = `<div class="card"><div class="empty">На сегодня всё пройдено 🎉<br>Загляни завтра — появятся новые карточки и повторения.</div></div>`;
    return;
  }
  if(idx >= deck.length){
    area.innerHTML = `<div class="card"><div class="empty">Тема пройдена!<br>Переключись на другую вкладку или начни заново.</div></div>`;
    return;
  }
  const c = deck[idx];
  area.innerHTML = `
    <div class="card">
      <div class="kind">${c.kind}</div>
      <div class="prompt">${c.prompt}</div>
      <input type="text" id="answerInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <div class="btnrow">
        <button class="check-btn" id="checkBtn">Controlla</button>
        <button class="next-btn" id="nextBtn">Avanti →</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  `;
  const input = document.getElementById('answerInput');
  input.focus();
  document.getElementById('checkBtn').addEventListener('click', checkAnswer);
  document.getElementById('nextBtn').addEventListener('click', goNext);
  input.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){
      const checkBtn = document.getElementById('checkBtn');
      if(checkBtn.style.display !== 'none'){ checkAnswer(); }
      else { goNext(); }
    }
  });
}

function updateSRSAfterAnswer(card, correct){
  const st = srsState[card.id];
  const today = todayKey();
  st.seen = true;
  if(correct){
    st.box = Math.min(st.box + 1, INTERVALS.length - 1);
    const days = INTERVALS[st.box];
    const due = new Date();
    due.setDate(due.getDate() + days);
    st.due = due.toISOString().slice(0,10);
  } else {
    st.box = 0;
    st.due = today;
  }
  saveSRS(srsState);
}

function checkAnswer(){
  const c = deck[idx];
  const input = document.getElementById('answerInput');
  const val = input.value;
  const fb = document.getElementById('feedback');
  const correct = isCorrect(val, c.answers);

  input.disabled = true;
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'block';

  if(correct){
    fb.className = 'feedback correct';
    fb.innerHTML = '✓ Giusto!'
      + '<div class="correct-answer">' + c.answers[0] + '</div>'
      + (c.trans ? '<div style="font-weight:400;margin-top:4px;">' + c.trans + '</div>' : '');
    stats.correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '✗ Non esatto.<div class="correct-answer">' + c.answers[0] + '</div>'
      + (c.trans ? '<div style="font-weight:400;margin-top:4px;">' + c.trans + '</div>' : '');
    stats.wrong++;
  }
  saveStats(stats);
  renderStats();

  if(activeTopic === "Смешанное"){
    updateSRSAfterAnswer(c, correct);
  } else {
    // topic drill still feeds the same SRS record
    updateSRSAfterAnswer(c, correct);
  }
}

function goNext(){
  idx++;
  renderCard();
}

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(confirm('Точно сбросить весь прогресс? Это нельзя отменить.')){
    localStorage.removeItem(STORAGE_SRS);
    localStorage.removeItem(STORAGE_STATS);
    srsState = {};
    CARD_DATA.forEach(c=>ensureCardState(c.id));
    saveSRS(srsState);
    stats = {day: todayKey(), correct:0, wrong:0};
    saveStats(stats);
    renderStats();
    buildDeck();
    renderCard();
  }
});

/* ======================= INIT ======================= */
renderTabs();
renderStats();
buildDeck();
renderCard();
</script>
