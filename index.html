<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Italiano">
<meta name="theme-color" content="#0e0e12">
<title>Italiano — Pratica</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0e0e12;--surface:#16161c;--border:#2a2a35;
    --accent:#c8a96e;--adim:rgba(200,169,110,.10);
    --text:#e8e6e0;--muted:#6b6b7a;--soft:#9e9dab;
    --green:#6aab80;--gbg:rgba(106,171,128,.10);
    --red:#c05449;--rbg:rgba(192,84,73,.10);
  }
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px 80px}
  header{text-align:center;margin-bottom:28px}
  header h1{font-family:'EB Garamond',serif;font-size:2.2rem;font-weight:400;color:var(--accent)}
  header p{color:var(--muted);font-size:.75rem;margin-top:4px;letter-spacing:.08em;text-transform:uppercase}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:640px;width:100%;margin-bottom:22px}
  .tab{border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);
    font-size:.74rem;padding:5px 13px;cursor:pointer;transition:all .15s;white-space:nowrap}
  .tab.on{border-color:var(--accent);color:var(--accent);background:var(--adim)}
  .stats{display:flex;gap:24px;margin-bottom:22px;font-size:.78rem;color:var(--muted)}
  .stats b{color:var(--text);font-weight:500}
  .progress{width:100%;max-width:520px;height:2px;background:var(--border);border-radius:2px;margin-bottom:18px}
  .progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
  .card{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:32px 32px 28px;position:relative}
  .badge{position:absolute;top:14px;right:16px;font-size:.65rem;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:3px 8px}
  .qlabel{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .qtext{font-family:'EB Garamond',serif;font-size:1.5rem;line-height:1.35;margin-bottom:4px}
  .qsub{font-size:.8rem;color:var(--muted);font-style:italic;margin-bottom:22px}
  input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:'EB Garamond',serif;font-size:1.3rem;
    padding:12px 14px;outline:none;transition:border-color .15s;margin-bottom:12px}
  input[type=text]:focus{border-color:var(--accent)}
  input[type=text].ok{border-color:var(--green);background:var(--gbg)}
  input[type=text].err{border-color:var(--red);background:var(--rbg)}
  .btns{display:flex;gap:8px}
  .bprim{flex:1;background:var(--accent);color:#0e0e12;border:none;border-radius:8px;
    padding:11px 16px;font-family:'Inter',sans-serif;font-size:.84rem;font-weight:500;cursor:pointer;transition:opacity .15s}
  .bprim:hover{opacity:.85}.bprim:disabled{opacity:.3;cursor:default}
  .bghost{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);
    font-family:'Inter',sans-serif;font-size:.84rem;padding:11px 16px;cursor:pointer;transition:all .15s}
  .bghost:hover{border-color:var(--accent);color:var(--accent)}
  .fb{margin-top:14px;font-size:.88rem;min-height:18px}
  .fb.ok{color:var(--green)}.fb.err{color:var(--red)}
  .note{margin-top:10px;padding:11px 14px;background:rgba(255,255,255,.03);border-radius:8px;
    border-left:2px solid var(--accent);font-size:.8rem;color:var(--soft);line-height:1.55;display:none}
  .note.on{display:block}.note b{color:var(--text);font-weight:500}
  .nextbtn{display:none;margin-top:14px;width:100%;background:transparent;border:1px solid var(--border);
    border-radius:8px;color:var(--muted);font-family:'Inter',sans-serif;font-size:.84rem;
    padding:11px;cursor:pointer;transition:all .15s}
  .nextbtn:hover{border-color:var(--accent);color:var(--accent)}
  .nextbtn.on{display:block}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:520px;width:100%;margin-bottom:16px}
  .tbtn{border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);
    font-size:.7rem;padding:5px 11px;cursor:pointer;transition:all .15s}
  .tbtn:hover{border-color:var(--accent);color:var(--accent)}
  .dots{display:flex;gap:5px;margin-bottom:14px;align-items:center}
  .dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--accent);transition:all .2s}
  .dot.full{background:var(--accent)}
  .dots .archived-label{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--green);margin-left:4px}
  .empty{width:100%;max-width:520px;text-align:center;color:var(--muted);font-size:.9rem;
    padding:40px 20px;line-height:1.6}
  .empty b{color:var(--accent);font-weight:500}
  .saved-flash{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--surface);border:1px solid var(--green);color:var(--green);
    font-size:.78rem;padding:8px 18px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none}
  .saved-flash.on{opacity:1}
</style>
</head>
<body>
<header>
  <h1>Pratica italiana</h1>
  <p>Тренажёр по урокам · ввод + архив</p>
</header>
<div class="tabs" id="tabs"></div>
<div class="toolbar">
  <button class="tbtn" id="resetbtn">↺ Сбросить прогресс</button>
</div>
<div class="progress"><div class="progress-bar" id="pbar" style="width:0%"></div></div>
<div class="stats">
  <div>Правильно: <b id="sok">0</b></div>
  <div>Всего: <b id="stot">0</b></div>
  <div>Серия: <b id="sstr">0</b></div>
  <div>В архиве: <b id="sarch">0</b></div>
</div>
<div class="card" id="card">
  <div class="badge" id="badge"></div>
  <div class="qlabel">Задание</div>
  <div class="dots" id="dots"></div>
  <div class="qtext" id="qtext"></div>
  <div class="qsub" id="qsub"></div>
  <input type="text" id="inp" placeholder="scrivi qui..." autocomplete="off" spellcheck="false">
  <div class="btns">
    <button class="bprim" id="chkbtn">Проверить</button>
    <button class="bghost" id="skipbtn">Пропустить</button>
  </div>
  <div class="fb" id="fb"></div>
  <div class="note" id="note"></div>
  <button class="nextbtn" id="nextbtn">Следующий →</button>
</div>
<div class="empty" id="empty" style="display:none"></div>
<div class="saved-flash" id="flash">Сохранено ✓</div>

<script>
const T = {
  greet:  "👋 Знакомство",
  essere: "🔵 Essere",
  avere:  "🟡 Avere",
  fare:   "⚙️ Fare",
  numeri: "🔢 Числа",
  giorni: "📅 Дни и даты",
  attiv:  "🎯 Активности",
  avgo:   "🚶 Andare/Venire",
  freq:   "⏱ Частота",
  mix:    "🔀 Микс тем",
};

const ALL = [

// ══ ЗНАКОМСТВО ══════════════════════════════════════════
{id:"greet01",topic:"greet",q:"Как спросить «Как тебя зовут?» (неформально)?",a:"come ti chiami",sub:"вопрос",
note:"<b>Come ti chiami?</b> — неформально. Come si chiama? — формально (Lei)."},
{id:"greet02",topic:"greet",q:"Ответь: «Меня зовут Полина.»",a:["mi chiamo polina","io mi chiamo polina"],sub:"ответ",
note:"<b>Mi chiamo…</b> — меня зовут. Буквально «я себя называю»."},
{id:"greet03",topic:"greet",q:"Как спросить «Откуда ты?»?",a:"di dove sei",sub:"вопрос",
note:"<b>Di dove sei?</b> Ответ: Sono di San Pietroburgo."},
{id:"greet04",topic:"greet",q:"Переведи: «Я из Санкт-Петербурга.»",a:"sono di san pietroburgo",sub:"перевод",
note:"<b>di + город</b> = из города. Артикль не нужен."},
{id:"greet05",topic:"greet",q:"Как спросить «Где ты живёшь?»?",a:"dove abiti",sub:"вопрос",
note:"<b>Dove abiti?</b> Ответ: Abito a Milano."},
{id:"greet06",topic:"greet",q:"Переведи: «Я живу в Риме.»",a:"abito a roma",sub:"перевод",
note:"<b>abitare + a + город</b>. Предлог a перед любым городом."},
{id:"greet07",topic:"greet",q:"Как спросить «Чем ты занимаешься?»?",a:"che lavoro fai",sub:"вопрос",
note:"Буквально «какую работу делаешь?». Ответ: Faccio il/la + профессия."},
{id:"greet08",topic:"greet",q:"Как спросить «Сколько тебе лет?»?",a:"quanti anni hai",sub:"вопрос",
note:"Возраст всегда с <b>avere</b>: Ho venticinque anni."},
{id:"greet09",topic:"greet",q:"Переведи: «Мне 25 лет.»",a:"ho venticinque anni",sub:"перевод",
note:"С возрастом только <b>avere</b>, никогда essere."},
{id:"greet10",topic:"greet",q:"Как сказать «Приятно познакомиться»?",a:"piacere",sub:"фраза",
note:"<b>Piacere!</b> Или Molto piacere! = очень приятно."},
{id:"greet11",topic:"greet",q:"Как спросить «Ты живёшь одна?» (ж.р.)?",a:"abiti da sola",sub:"вопрос",
note:"<b>da sola</b> (ж.) / da solo (м.) / da soli (мн.м.) / da sole (мн.ж.)"},
{id:"greet12",topic:"greet",q:"Переведи: «Я живу одна.» (говорит женщина)",a:"abito da sola",sub:"перевод",
note:"da sola согласуется с субъектом по роду и числу."},
{id:"greet13",topic:"greet",q:"Как спросить «Какие языки ты знаешь?»?",a:"che lingue parli",sub:"вопрос",
note:"<b>Che lingue parli?</b> lingue = мн.ч. от lingua."},
{id:"greet14",topic:"greet",q:"Переведи: «Я ещё не говорю по-итальянски хорошо.»",a:"ancora non parlo bene italiano",sub:"перевод",
note:"<b>ancora non</b> = ещё не. non стоит перед глаголом."},
{id:"greet15",topic:"greet",q:"Переведи: «Я хорошо знаю Италию.»",a:"conosco bene l'italia",sub:"перевод",
note:"<b>conoscere</b> = знать место/человека. io conosco."},
{id:"greet16",topic:"greet",q:"Переведи: «Я путешествую часто по работе.»",a:"viaggio spesso per lavoro",sub:"перевод",
note:"<b>per lavoro</b> = по работе. spesso = часто."},
{id:"greet17",topic:"greet",q:"Переведи: «Когда у меня есть немного свободного времени, я осматриваю город.»",a:"quando ho un po' di tempo libero visito la citta",sub:"перевод",
note:"<b>tempo libero</b> = свободное время. visitare la città = осматривать город."},

// ══ ESSERE ══════════════════════════════════════════════
{id:"essere01",topic:"essere",q:"Спряги essere: io",a:"sono",sub:"форма",
note:"essere: sono / sei / è / siamo / siete / sono"},
{id:"essere02",topic:"essere",q:"Спряги essere: tu",a:"sei",sub:"форма",
note:"essere: sono / <b>sei</b> / è / siamo / siete / sono"},
{id:"essere03",topic:"essere",q:"Спряги essere: lui/lei",a:"è",sub:"форма",
note:"<b>è</b> — обязательно с accent grave. Без него это союз e (и)."},
{id:"essere04",topic:"essere",q:"Спряги essere: noi",a:"siamo",sub:"форма",
note:"essere: sono / sei / è / <b>siamo</b> / siete / sono"},
{id:"essere05",topic:"essere",q:"Спряги essere: voi",a:"siete",sub:"форма",
note:"essere: sono / sei / è / siamo / <b>siete</b> / sono"},
{id:"essere06",topic:"essere",q:"Спряги essere: loro",a:"sono",sub:"форма",
note:"io и loro совпадают: <b>sono</b>. Контекст определяет смысл."},
{id:"essere07",topic:"essere",q:"Переведи: «Я устала.» (женщина)",a:"sono stanca",sub:"перевод",
note:"Состояния (stanco/a, felice, triste, arrabbiato/a) — с <b>essere</b>."},
{id:"essere08",topic:"essere",q:"Переведи: «Он сердитый.»",a:"lui e arrabbiato",sub:"перевод",
note:"lui <b>è</b> arrabbiato. Женский род: arrabbiata."},
{id:"essere09",topic:"essere",q:"Переведи: «Она грустная.»",a:"lei e triste",sub:"перевод",
note:"<b>triste</b> не меняется по роду (оканчивается на -e)."},
{id:"essere10",topic:"essere",q:"Переведи: «Мы счастливые.»",a:"siamo felici",sub:"перевод",
note:"felice → мн.ч. <b>felici</b>. Прилагательные на -e во мн.ч. → -i."},
{id:"essere11",topic:"essere",q:"Переведи: «Они уставшие.» (мужчины)",a:"sono stanchi",sub:"перевод",
note:"stanco → мн.ч. <b>stanchi</b> (-co → -chi)."},
{id:"essere12",topic:"essere",q:"Переведи: «Когда я путешествую, я счастливая.»",a:"quando viaggio sono felice",sub:"перевод",
note:"felice не меняется по роду. quando = когда."},
{id:"essere13",topic:"essere",q:"Переведи: «Когда я много работаю, я устаю.» (женщина)",a:"quando lavoro molto sono stanca",sub:"перевод",
note:"molto = много (наречие, не меняется). stanca — ж.р."},
{id:"essere14",topic:"essere",q:"Переведи: «Милан — красивый город.»",a:"milano e una bella citta",sub:"перевод",
note:"è una bella città. bella согласуется с città (ж.р.)."},
{id:"essere15",topic:"essere",q:"Переведи: «Гостиницы дорогие.»",a:"gli alberghi sono cari",sub:"перевод",
note:"albergo → мн.ч. <b>alberghi</b>. Артикль gli."},
{id:"essere16",topic:"essere",q:"Переведи: «Сейчас Кристина в Москве.»",a:"adesso cristina e a mosca",sub:"перевод",
note:"adesso / ora = сейчас. essere + a + город = находиться в городе."},
{id:"essere17",topic:"essere",q:"Переведи: «Когда я в Италии, я живу в гостинице.»",a:"quando sono in italia abito in albergo",sub:"перевод",
note:"<b>in + место</b> без артикля: in Italia, in albergo, in ufficio."},
{id:"essere18",topic:"essere",q:"Переведи: «Сегодня хороший день.»",a:"oggi e una bella giornata",sub:"перевод",
note:"<b>giornata</b> = день (с акцентом на протяжённость). oggi = сегодня."},
{id:"essere19",topic:"essere",q:"Переведи: «Полдень. В доме две персоны.»",a:"e mezzogiorno in casa ci sono due persone",sub:"перевод",
note:"<b>mezzogiorno</b> = полдень. <b>ci sono</b> = есть (мн.ч. существование)."},

// ══ AVERE ═══════════════════════════════════════════════
{id:"avere01",topic:"avere",q:"Спряги avere: io",a:"ho",sub:"форма",
note:"avere: ho / hai / ha / abbiamo / avete / hanno. h не произносится."},
{id:"avere02",topic:"avere",q:"Спряги avere: tu",a:"hai",sub:"форма",
note:"avere: ho / <b>hai</b> / ha / abbiamo / avete / hanno"},
{id:"avere03",topic:"avere",q:"Спряги avere: lui/lei",a:"ha",sub:"форма",
note:"avere: ho / hai / <b>ha</b> / abbiamo / avete / hanno"},
{id:"avere04",topic:"avere",q:"Спряги avere: noi",a:"abbiamo",sub:"форма",
note:"avere: ho / hai / ha / <b>abbiamo</b> / avete / hanno"},
{id:"avere05",topic:"avere",q:"Спряги avere: voi",a:"avete",sub:"форма",
note:"avere: ho / hai / ha / abbiamo / <b>avete</b> / hanno"},
{id:"avere06",topic:"avere",q:"Спряги avere: loro",a:"hanno",sub:"форма",
note:"avere: ho / hai / ha / abbiamo / avete / <b>hanno</b>"},
{id:"avere07",topic:"avere",q:"Переведи: «Я хочу есть.»",a:"ho fame",sub:"перевод",
note:"<b>avere fame</b> = быть голодным."},
{id:"avere08",topic:"avere",q:"Переведи: «Я хочу пить.»",a:"ho sete",sub:"перевод",
note:"<b>avere sete</b> = испытывать жажду."},
{id:"avere09",topic:"avere",q:"Переведи: «Мне холодно.»",a:"ho freddo",sub:"перевод",
note:"<b>avere freddo</b> = мёрзнуть. freddo не согласуется по роду."},
{id:"avere10",topic:"avere",q:"Переведи: «Мне жарко.»",a:"ho caldo",sub:"перевод",
note:"<b>avere caldo</b> = быть жарко."},
{id:"avere11",topic:"avere",q:"Переведи: «Я хочу спать.»",a:"ho sonno",sub:"перевод",
note:"<b>avere sonno</b> = хотеть спать."},
{id:"avere12",topic:"avere",q:"Переведи: «Я тороплюсь.»",a:"ho fretta",sub:"перевод",
note:"<b>avere fretta</b> = торопиться."},
{id:"avere13",topic:"avere",q:"Переведи: «Я боюсь темноты.»",a:"ho paura del buio",sub:"перевод",
note:"<b>avere paura DI</b>. di + il = del. buio = темнота."},
{id:"avere14",topic:"avere",q:"Переведи: «Мне нужно учиться.»",a:"ho bisogno di studiare",sub:"перевод",
note:"<b>avere bisogno DI</b> + глагол. Предлог di обязателен."},
{id:"avere15",topic:"avere",q:"Переведи: «Когда жарко, я хочу пить.»",a:"quando fa caldo ho sete",sub:"перевод",
note:"Погода — fa caldo/freddo. Состояние — ho sete."},
{id:"avere16",topic:"avere",q:"Переведи: «У меня есть стакан воды.»",a:"ho un bicchiere d'acqua",sub:"перевод",
note:"<b>bicchiere</b> = стакан. d'acqua = di acqua."},
{id:"fare01",topic:"fare",q:"Спряги fare: io",a:"faccio",sub:"форма",
note:"fare: faccio / fai / fa / facciamo / fate / fanno"},
{id:"fare02",topic:"fare",q:"Спряги fare: tu",a:"fai",sub:"форма",
note:"fare: faccio / <b>fai</b> / fa / facciamo / fate / fanno"},
{id:"fare03",topic:"fare",q:"Спряги fare: lui/lei",a:"fa",sub:"форма",
note:"fare: faccio / fai / <b>fa</b> / facciamo / fate / fanno"},
{id:"fare04",topic:"fare",q:"Спряги fare: noi",a:"facciamo",sub:"форма",
note:"fare: faccio / fai / fa / <b>facciamo</b> / fate / fanno"},
{id:"fare05",topic:"fare",q:"Спряги fare: voi",a:"fate",sub:"форма",
note:"fare: faccio / fai / fa / facciamo / <b>fate</b> / fanno"},
{id:"fare06",topic:"fare",q:"Спряги fare: loro",a:"fanno",sub:"форма",
note:"fare: faccio / fai / fa / facciamo / fate / <b>fanno</b>"},
{id:"fare07",topic:"fare",q:"Переведи: «Я готовлю завтрак.»",a:"faccio la colazione",sub:"перевод",
note:"<b>fare la colazione</b> = завтракать."},
{id:"fare08",topic:"fare",q:"Переведи: «Она — медсестра.»",a:"fa l'infermiera",sub:"перевод",
note:"fare + артикль + профессия."},
{id:"fare09",topic:"fare",q:"Переведи: «Он — повар.»",a:"fa il cuoco",sub:"перевод",
note:"cuoco (м.) → cuoca (ж.)."},
{id:"fare10",topic:"fare",q:"Переведи: «Очень жарко.»",a:"fa molto caldo",sub:"перевод",
note:"Погода — fare: fa caldo, fa freddo, fa bello."},
{id:"fare11",topic:"fare",q:"Переведи: «Что ты делаешь?»",a:["che cosa fai","cosa fai","che fai"],sub:"перевод",
note:"<b>Che cosa fai?</b> / Cosa fai? / Che fai? — все варианты правильны."},
{id:"fare12",topic:"fare",q:"Переведи: «Я работаю в офисе.»",a:"lavoro in ufficio",sub:"перевод",

// ═══════════════════════════════════════════════════════
// ПРОГРЕСС (localStorage)
// ═══════════════════════════════════════════════════════
const STORAGE_KEY="italiano_pratica";
const ARCHIVE_THRESHOLD=5;          // 5 правильных суммарно → архив
let progress={};                     // progress[id]={correct:N}

function loadProgress(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){const d=JSON.parse(raw);progress=d.progress||{};sokN=d.sokN||0;stotN=d.stotN||0;}
  }catch(e){progress={};}
}
function saveProgress(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({progress,sokN,stotN,updated:new Date().toISOString()}));
    flashSaved();
  }catch(e){}
}
let flashTimer=null;
function flashSaved(){
  const f=document.getElementById('flash');f.className='saved-flash on';
  clearTimeout(flashTimer);flashTimer=setTimeout(()=>{f.className='saved-flash';},1200);
}
function getCorrect(id){return (progress[id]&&progress[id].correct)||0;}
function isArchived(id){return getCorrect(id)>=ARCHIVE_THRESHOLD;}
function archivedCount(){return ALL.filter(x=>isArchived(x.id)).length;}

// ═══════════════════════════════════════════════════════
// ЛОГИКА
// ═══════════════════════════════════════════════════════
let activeTopic="all",queue=[],current=null,answered=false;
let sokN=0,stotN=0,streakN=0,seen=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}

function buildQueue(){
  let pool;
  if(activeTopic==="archive")      pool=ALL.filter(x=>isArchived(x.id));
  else if(activeTopic==="all")     pool=ALL.filter(x=>!isArchived(x.id));
  else                             pool=ALL.filter(x=>x.topic===activeTopic && !isArchived(x.id));
  return shuffle([...pool]);
}

function normalize(s){
  return s.trim().toLowerCase()
    .replace(/[àáâ]/g,'a').replace(/[èéê]/g,'e')
    .replace(/[ìíî]/g,'i').replace(/[òóô]/g,'o')
    .replace(/[ùúû]/g,'u')
    .replace(/[.,!?;:'"«»]/g,'').replace(/\s+/g,' ');
}

function isCorrect(inp,ans){
  const n=normalize(inp);
  if(Array.isArray(ans) && ans.length===1 && typeof ans[0]==='string' && ans[0].startsWith('__free__:')){
    const keywords=ans[0].slice('__free__:'.length).split(',').map(k=>normalize(k));
    const hasKeyword=keywords.some(k=>n.includes(k));
    const longEnough=n.split(' ').length>=2;
    return hasKeyword && longEnough;
  }
  return Array.isArray(ans)?ans.some(a=>normalize(a)===n):normalize(ans)===n;
}

function isFreeQuestion(item){
  return Array.isArray(item.a) && item.a.length===1 && typeof item.a[0]==='string' && item.a[0].startsWith('__free__:');
}

function renderTabs(){
  const c=document.getElementById('tabs');c.innerHTML='';
  const mk=(label,key)=>{
    const b=document.createElement('button');
    b.className='tab'+(activeTopic===key?' on':'');
    b.textContent=label;
    b.onclick=()=>{activeTopic=key;renderTabs();queue=buildQueue();loadCard();};
    c.appendChild(b);
  };
  mk('🔀 Все','all');
  Object.entries(T).forEach(([k,v])=>mk(v,k));
  const arch=archivedCount();
  mk('📦 Архив'+(arch?' ('+arch+')':''),'archive');
}

function renderDots(id){
  const c=document.getElementById('dots');c.innerHTML='';
  const capped=Math.min(getCorrect(id),ARCHIVE_THRESHOLD);
  for(let i=0;i<ARCHIVE_THRESHOLD;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<capped?' full':'');
    c.appendChild(d);
  }
  if(isArchived(id)){
    const l=document.createElement('span');
    l.className='archived-label';l.textContent='в архиве';c.appendChild(l);
  }
}

function showEmpty(msg){
  document.getElementById('card').style.display='none';
  const e=document.getElementById('empty');e.style.display='block';e.innerHTML=msg;
}
function hideEmpty(){
  document.getElementById('empty').style.display='none';
  document.getElementById('card').style.display='block';
}

function loadCard(){
  if(activeTopic==="archive" && archivedCount()===0){
    showEmpty("В архиве пока пусто.<br>Ответь на вопрос правильно <b>5 раз</b> — и он попадёт сюда для повторения.");return;
  }
  if(!queue.length)queue=buildQueue();
  if(!queue.length){
    showEmpty("🎉 Все вопросы этой темы — <b>в архиве!</b><br>Загляни во вкладку 📦 Архив, чтобы повторить, или выбери другую тему.");return;
  }
  hideEmpty();
  current=queue.pop();answered=false;seen++;
  document.getElementById('badge').textContent=T[current.topic]||current.topic;
  renderDots(current.id);
  document.getElementById('qtext').textContent=current.q;
  document.getElementById('qsub').textContent=current.sub||'';
  document.getElementById('fb').textContent='';
  document.getElementById('fb').className='fb';
  document.getElementById('note').className='note';
  document.getElementById('note').innerHTML='';
  document.getElementById('nextbtn').className='nextbtn';
  const inp=document.getElementById('inp');
  inp.value='';inp.className='';inp.disabled=false;
  document.getElementById('chkbtn').disabled=false;
  document.getElementById('pbar').style.width=((seen%25)/25*100)+'%';
  setTimeout(()=>inp.focus(),50);
}

function check(){
  if(answered)return;
  const inp=document.getElementById('inp');
  const val=inp.value.trim();if(!val)return;
  answered=true;stotN++;
  document.getElementById('stot').textContent=stotN;
  const ok=isCorrect(val,current.a);
  const free=isFreeQuestion(current);
  if(ok){
    sokN++;streakN++;inp.className='ok';
    if(!progress[current.id])progress[current.id]={correct:0};
    const wasArchived=isArchived(current.id);
    progress[current.id].correct++;
    document.getElementById('fb').textContent=free?'Засчитано ✓':'Corretto ✓';
    document.getElementById('fb').className='fb ok';
    renderDots(current.id);
    if(!wasArchived && isArchived(current.id)){
      renderTabs();
      document.getElementById('fb').textContent=(free?'Засчитано ✓':'Corretto ✓')+' — ушло в 📦 архив!';
    }
  }else{
    streakN=0;inp.className='err';
    if(free){document.getElementById('fb').textContent='Используй глагол из примера ниже';}
    else{const ans=Array.isArray(current.a)?current.a[0]:current.a;document.getElementById('fb').textContent='→ '+ans;}
    document.getElementById('fb').className='fb err';
  }
  document.getElementById('sok').textContent=sokN;
  document.getElementById('sstr').textContent=streakN;
  document.getElementById('sarch').textContent=archivedCount();
  if(current.note){document.getElementById('note').innerHTML=current.note;document.getElementById('note').className='note on';}
  inp.disabled=true;document.getElementById('chkbtn').disabled=true;
  document.getElementById('nextbtn').className='nextbtn on';
  saveProgress();
}

// ── Сброс ──
function resetProgress(){
  if(!confirm('Сбросить весь прогресс? Архив и счётчики обнулятся.'))return;
  progress={};sokN=0;stotN=0;streakN=0;
  try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
  document.getElementById('sok').textContent=0;
  document.getElementById('stot').textContent=0;
  document.getElementById('sstr').textContent=0;
  document.getElementById('sarch').textContent=0;
  activeTopic='all';renderTabs();queue=buildQueue();loadCard();
}

// ── События ──
document.getElementById('chkbtn').onclick=check;
document.getElementById('skipbtn').onclick=()=>loadCard();
document.getElementById('nextbtn').onclick=()=>loadCard();
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter'){answered?loadCard():check();}});
document.getElementById('resetbtn').onclick=resetProgress;

// ── Старт ──
loadProgress();
document.getElementById('sok').textContent=sokN;
document.getElementById('stot').textContent=stotN;
document.getElementById('sarch').textContent=archivedCount();
renderTabs();queue=buildQueue();loadCard();
</script>
