<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Italiano</title>
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --ink: #1A1A1A;
    --muted: #888;
    --line: #E5E0D8;
    --accent: #C85A2A;
    --accent-light: #F2E4DC;
    --green: #3A7D44;
    --green-light: #E6F4E8;
    --red: #C0392B;
    --red-light: #FDECEA;
    --gold: #D4A843;
    --radius: 14px;
    --font: 'Georgia', serif;
    --ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    font-family: var(--ui);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-title { font-family: var(--font); font-size: 18px; font-style: italic; color: var(--accent); }
  .header-stats { display: flex; gap: 12px; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .header-stat strong { color: var(--ink); font-weight: 600; }
  .tabs {
    display: flex; gap: 8px; padding: 12px 20px 0; overflow-x: auto;
  }
  .tab {
    padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    background: var(--surface); border: 1px solid var(--line); color: var(--muted);
    white-space: nowrap; cursor: pointer;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .screen { padding: 18px 20px 40px; max-width: 520px; margin: 0 auto; }
  .card-box {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 22px 18px; margin-bottom: 14px;
  }
  .dir-badge {
    display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: .04em;
    color: var(--accent); background: var(--accent-light); padding: 3px 9px; border-radius: 10px;
    margin-bottom: 12px; text-transform: uppercase;
  }
  .prompt-text { font-family: var(--font); font-size: 21px; line-height: 1.4; margin-bottom: 16px; }
  .prompt-text.it { font-style: italic; }
  input[type=text] {
    width: 100%; padding: 13px 14px; border: 1.5px solid var(--line); border-radius: 10px;
    font-size: 16px; font-family: var(--ui); background: var(--bg); color: var(--ink);
  }
  input[type=text]:focus { outline: none; border-color: var(--accent); }
  .btn {
    display: block; width: 100%; padding: 13px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; margin-top: 10px; cursor: pointer; font-family: var(--ui);
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface); border: 1.5px solid var(--line); color: var(--ink); }
  .feedback {
    margin-top: 14px; padding: 13px 14px; border-radius: 10px; font-size: 14px; line-height: 1.5;
  }
  .feedback.correct { background: var(--green-light); color: var(--green); }
  .feedback.almost { background: var(--gold-light, #FAF1DC); color: #8a6d1f; }
  .feedback.wrong { background: var(--red-light); color: var(--red); }
  .feedback .answer-line { font-weight: 700; margin-top: 4px; }
  .topics-line { font-size: 11px; color: var(--muted); margin-top: 10px; }
  .progress-bar-wrap { height: 5px; background: var(--line); border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); transition: width .3s; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .big { font-size: 42px; margin-bottom: 14px; }
  .diary-entry {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 10px;
  }
  .diary-date { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  textarea {
    width: 100%; min-height: 110px; padding: 13px 14px; border: 1.5px solid var(--line); border-radius: 10px;
    font-size: 15px; font-family: var(--ui); background: var(--bg); color: var(--ink); resize: vertical;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .stat-tile { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; text-align: center; }
  .stat-tile .num { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat-tile .label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .reset-link { display: block; text-align: center; margin-top: 30px; font-size: 12px; color: var(--muted); }
</style>
</head>

  { id:'c102', it:'C\'è qualcuno in cucina? Sì, c\'è mia madre.', ru:'Кто-то есть на кухне? Да, там моя мама.', topics:['ce','genere'] },
];

const NEW_PER_DAY = 15;
const STORAGE_KEY = 'italiano_v3';

let state = load();
let queue = [];
let qi = 0;
let currentDir = 'it2ru';
let answered = false;
let activeTab = 'study';

function defaultState() {
  return {
    cards: {},     // id -> {ease, interval, due, reps, lapses}
    streak: 0, lastStudyDay: null,
    todayCount: 0, todayDay: null,
    diary: []
  };
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  } catch (e) { return defaultState(); }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// day rollover at 4am
function ankiDay() {
  const d = new Date();
  d.setHours(d.getHours() - 4);
  return d.toISOString().slice(0,10);
}

function ensureDay() {
  const today = ankiDay();
  if (state.todayDay !== today) {
    if (state.todayDay) {
      const prev = new Date(state.todayDay);
      const cur = new Date(today);
      const diffDays = Math.round((cur - prev) / 86400000);
      if (diffDays === 1 && state.todayCount > 0) state.streak += 1;
      else if (diffDays !== 0) state.streak = (state.todayCount > 0) ? 1 : 0;
    }
    state.todayCount = 0;
    state.todayDay = today;
    save();
  }
}

function cardState(id) {
  if (!state.cards[id]) {
    state.cards[id] = { ease: 2.3, interval: 0, due: ankiDay(), reps: 0, lapses: 0, seen: false };
  }
  return state.cards[id];
}

// SM-2-ish, quality auto-derived from correctness (no self-rating)
function gradeCard(id, quality) {
  const c = cardState(id);
  c.seen = true;
  if (quality < 3) {
    c.lapses += 1;
    c.interval = 0;
    c.reps = 0;
    c.due = ankiDay();
  } else {
    c.reps += 1;
    if (c.reps === 1) c.interval = 1;
    else if (c.reps === 2) c.interval = 3;
    else c.interval = Math.round(c.interval * c.ease);
    c.ease = Math.max(1.3, c.ease + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
    const d = new Date();
    d.setDate(d.getDate() + c.interval);
    c.due = d.toISOString().slice(0,10);
  }
  save();
}

function buildQueue() {
  ensureDay();
  const today = ankiDay();
  const due = [];
  const fresh = [];
  for (const card of CARDS) {
    const cs = cardState(card.id);
    if (!cs.seen) fresh.push(card);
    else if (cs.due <= today) due.push(card);
  }
  save();
  shuffle(due);
  shuffle(fresh);
  const newSlice = fresh.slice(0, Math.max(0, NEW_PER_DAY));
  const combined = due.concat(newSlice);
  shuffle(combined);
  // attach random direction per repetition
  return combined.map(c => ({ card: c, dir: Math.random() < 0.5 ? 'it2ru' : 'ru2it' }));
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

// ---------- normalization & matching ----------
function normalize(s) {
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // strip accents for comparison
    .replace(/['’]/g, ' ')
    .replace(/[^\p{L}\p{N}\s]/gu, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for (let i=0;i<=m;i++) dp[i][0]=i;
  for (let j=0;j<=n;j++) dp[0][j]=j;
  for (let i=1;i<=m;i++) {
    for (let j=1;j<=n;j++) {
      const cost = a[i-1]===b[j-1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
    }
  }
  return dp[m][n];
}

// Word-level edit distance: substitution cost depends on whether the
// words are a near-identical typo (allowed) or genuinely different words (not allowed).
function wordLevelDiff(userWords, correctWords) {
  const m = userWords.length, n = correctWords.length;
  // dp[i][j] = {cost, typos} best cost and typo-count to align first i user words with first j correct words
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(null));
  dp[0][0] = { cost: 0, typos: 0 };
  for (let i=1;i<=m;i++) dp[i][0] = { cost: dp[i-1][0].cost + 1, typos: dp[i-1][0].typos };
  for (let j=1;j<=n;j++) dp[0][j] = { cost: dp[0][j-1].cost + 1, typos: dp[0][j-1].typos };
  for (let i=1;i<=m;i++) {
    for (let j=1;j<=n;j++) {
      const a = userWords[i-1], b = correctWords[j-1];
      let subCost, subTypos;
      if (a === b) { subCost = 0; subTypos = 0; }
      else {
        const charDist = levenshtein(a, b);
        // allow a near-identical typo only for reasonably long words
        if (charDist === 1 && Math.max(a.length, b.length) >= 4) { subCost = 0.3; subTypos = 1; }
        else { subCost = 1; subTypos = 0; }
      }
      const subOption = { cost: dp[i-1][j-1].cost + subCost, typos: dp[i-1][j-1].typos + subTypos };
      const delOption = { cost: dp[i-1][j].cost + 1, typos: dp[i-1][j].typos };
      const insOption = { cost: dp[i][j-1].cost + 1, typos: dp[i][j-1].typos };
      let bestOpt = subOption;
      if (delOption.cost < bestOpt.cost) bestOpt = delOption;
      if (insOption.cost < bestOpt.cost) bestOpt = insOption;
      dp[i][j] = bestOpt;
    }
  }
  return dp[m][n];
}

// returns 'exact' | 'close' | 'wrong'
function matchAnswer(userInput, correctOptions) {
  const u = normalize(userInput);
  if (!u) return 'wrong';
  const uWords = u.split(' ').filter(Boolean);
  let best = 'wrong';
  for (const opt of correctOptions) {
    const o = normalize(opt);
    if (u === o) return 'exact';
    const oWords = o.split(' ').filter(Boolean);
    const result = wordLevelDiff(uWords, oWords);
    // allow at most 1-2 minor character typos (no wrong/missing/extra words at all)
    if (result.cost <= 0.6 && result.typos <= 2) best = 'close';
  }
  return best;
}

// ============== RENDER ==============
function render() {
  ensureDay();
  document.getElementById('hStreak').textContent = state.streak;
  document.getElementById('hToday').textContent = state.todayCount;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === activeTab));

  const screen = document.getElementById('screen');
  if (activeTab === 'study') renderStudy(screen);
  else if (activeTab === 'diary') renderDiary(screen);
  else renderStats(screen);
}

function renderStudy(screen) {
  if (qi >= queue.length) {
    queue = buildQueue();
    qi = 0;
  }
  if (queue.length === 0) {
    screen.innerHTML = `
      <div class="empty-state">
        <div class="big">✅</div>
        <div>На сегодня всё пройдено.<br>Возвращайся завтра — появятся новые карточки на повторение.</div>
      </div>`;
    return;
  }

  const item = queue[qi];
  currentDir = item.dir;
  const card = item.card;
  const promptText = currentDir === 'it2ru' ? card.it : card.ru;
  const promptLabel = currentDir === 'it2ru' ? 'Переведи на русский' : 'Переведи на итальянский';

  const total = queue.length;
  const pct = Math.round((qi / total) * 100);

  screen.innerHTML = `
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="card-box">
      <div class="dir-badge">${promptLabel}</div>
      <div class="prompt-text ${currentDir==='it2ru' ? 'it':''}">${promptText}</div>
      <input type="text" id="answerInput" autocomplete="off" autocapitalize="off" autocorrect="off" placeholder="Твой ответ..." />
      <button class="btn btn-primary" id="checkBtn">Проверить</button>
      <div id="feedbackArea"></div>
      <div class="topics-line">${card.topics.join(' · ')}</div>
    </div>
  `;

  answered = false;
  const input = document.getElementById('answerInput');
  input.focus();
  const checkBtn = document.getElementById('checkBtn');
  checkBtn.addEventListener('click', () => handleCheck(card));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (!answered) handleCheck(card);
      else handleNext();
    }
  });
}

function handleCheck(card) {
  if (answered) return;
  answered = true;
  const input = document.getElementById('answerInput');
  const userVal = input.value;
  input.disabled = true;
  const fbArea = document.getElementById('feedbackArea');
  const checkBtn = document.getElementById('checkBtn');

  if (currentDir === 'ru2it') {
    // Producing Italian: grammar accuracy matters -> strict auto-check
    const correctOptions = [card.it].concat(card.itAlt || []);
    const correctDisplay = card.it;
    const result = matchAnswer(userVal, correctOptions);
    let quality;
    if (result === 'exact') {
      quality = 5;
      fbArea.innerHTML = `<div class="feedback correct">Верно!</div>`;
    } else if (result === 'close') {
      quality = 4;
      fbArea.innerHTML = `<div class="feedback almost">Почти — мелкая опечатка, засчитано.<div class="answer-line">${correctDisplay}</div></div>`;
    } else {
      quality = 1;
      fbArea.innerHTML = `<div class="feedback wrong">Неверно.<div class="answer-line">${correctDisplay}</div></div>`;
    }
    state.todayCount += 1;
    gradeCard(card.id, quality);
    save();
    document.getElementById('hToday').textContent = state.todayCount;
    checkBtn.textContent = 'Дальше';
    checkBtn.onclick = handleNext;
  } else {
    // Translating into Russian: meaning matters more than exact wording -> self-rating
    const correctDisplay = card.ru;
    fbArea.innerHTML = `
      <div class="feedback almost">
        Эталон: <div class="answer-line">${correctDisplay}</div>
        <div style="margin-top:10px;">Твой ответ совпадает по смыслу?</div>
      </div>
      <button class="btn btn-primary" id="selfYes" style="margin-top:8px;">Да, верно</button>
      <button class="btn btn-secondary" id="selfNo">Нет, неверно</button>
    `;
    checkBtn.style.display = 'none';
    document.getElementById('selfYes').addEventListener('click', () => selfGrade(card, true));
    document.getElementById('selfNo').addEventListener('click', () => selfGrade(card, false));
  }
}

function selfGrade(card, correct) {
  const quality = correct ? 5 : 1;
  state.todayCount += 1;
  gradeCard(card.id, quality);
  save();
  document.getElementById('hToday').textContent = state.todayCount;
  const fbArea = document.getElementById('feedbackArea');
  fbArea.innerHTML += `<button class="btn btn-primary" id="nextAfterSelf" style="margin-top:8px;">Дальше</button>`;
  document.getElementById('nextAfterSelf').addEventListener('click', handleNext);
}

function handleNext() {
  qi += 1;
  renderStudy(document.getElementById('screen'));
}

function renderDiary(screen) {
  const todayStr = ankiDay();
  const todayEntry = state.diary.find(d => d.date === todayStr);
  let html = `
    <div class="card-box">
      <div class="dir-badge">Свободное письмо</div>
      <div class="prompt-text" style="font-size:15px;font-style:normal;">Напиши пару фраз по-итальянски о сегодняшнем дне. Грамматика не должна быть идеальной — важна практика.</div>
      <textarea id="diaryInput" placeholder="Oggi...">${todayEntry ? todayEntry.text : ''}</textarea>
      <button class="btn btn-primary" id="diarySave">Сохранить</button>
    </div>
  `;
  if (state.diary.length) {
    html += `<div style="margin-top:24px;font-size:13px;color:var(--muted);margin-bottom:8px;">Прошлые записи</div>`;
    state.diary.slice().reverse().forEach(d => {
      if (d.date === todayStr) return;
      html += `<div class="diary-entry"><div class="diary-date">${d.date}</div>${escapeHtml(d.text)}</div>`;
    });
  }
  screen.innerHTML = html;
  document.getElementById('diarySave').addEventListener('click', () => {
    const text = document.getElementById('diaryInput').value.trim();
    if (!text) return;
    const idx = state.diary.findIndex(d => d.date === todayStr);
    if (idx >= 0) state.diary[idx].text = text;
    else state.diary.push({ date: todayStr, text });
    save();
    renderDiary(screen);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderStats(screen) {
  const total = CARDS.length;
  let seen = 0, mature = 0, dueToday = 0;
  const today = ankiDay();
  for (const card of CARDS) {
    const cs = state.cards[card.id];
    if (cs && cs.seen) {
      seen += 1;
      if (cs.interval >= 21) mature += 1;
      if (cs.due <= today) dueToday += 1;
    } else {
      dueToday += 1; // not yet introduced counts toward available pool, not "due review" strictly
    }
  }
  screen.innerHTML = `
    <div class="stat-grid">
      <div class="stat-tile"><div class="num">${state.streak}</div><div class="label">дней подряд</div></div>
      <div class="stat-tile"><div class="num">${state.todayCount}</div><div class="label">сегодня пройдено</div></div>
      <div class="stat-tile"><div class="num">${seen}/${total}</div><div class="label">карточек изучено</div></div>
      <div class="stat-tile"><div class="num">${mature}</div><div class="label">закреплено (21+ дн.)</div></div>
    </div>
    <div class="reset-link" id="resetLink">Сбросить весь прогресс</div>
  `;
  document.getElementById('resetLink').addEventListener('click', () => {
    if (!confirm('Точно сбросить весь прогресс?')) return;
    localStorage.removeItem(STORAGE_KEY);
    state = defaultState();
    save();
    queue = [];
    qi = 0;
    render();
  });
}

// ============== TABS ==============
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    activeTab = t.dataset.tab;
    if (activeTab === 'study') { queue = buildQueue(); qi = 0; }
    render();
  });
});

// ============== INIT ==============
ensureDay();
queue = buildQueue();
render();
</script>
</body>
</html>
